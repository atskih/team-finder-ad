services:
  db:
    image: postgres:16
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build: .
    env_file:
      - .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
      DJANGO_DEBUG: "False"
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn team_finder.wsgi:application --bind 0.0.0.0:8000"
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media
    depends_on:
      - db
    restart: always

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_data:/staticfiles:ro
      - media_data:/media:ro
    depends_on:
      - backend
    restart: always

volumes:
  postgres_data:
  static_data:
  media_data:
