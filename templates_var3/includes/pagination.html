{% if page_obj.has_other_pages %}
<nav class="pagination" aria-label="Навигация по страницам">
    {% if page_obj.has_previous %}
        <a class="pagination-link" href="?{% if active_skill %}skill={{ active_skill|urlencode }}&{% endif %}page={{ page_obj.previous_page_number }}">Назад</a>
    {% endif %}

    <span class="pagination-current">
        {{ page_obj.number }} / {{ page_obj.paginator.num_pages }}
    </span>

    {% if page_obj.has_next %}
        <a class="pagination-link" href="?{% if active_skill %}skill={{ active_skill|urlencode }}&{% endif %}page={{ page_obj.next_page_number }}">Вперёд</a>
    {% endif %}
</nav>
{% endif %}
