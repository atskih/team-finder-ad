name: tests

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: team_finder
          POSTGRES_USER: team_finder
          POSTGRES_PASSWORD: team_finder
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U team_finder -d team_finder"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SECRET_KEY: ci-secret-key
      DJANGO_DEBUG: "True"
      TASK_VERSION: "3"
      POSTGRES_DB: team_finder
      POSTGRES_USER: team_finder
      POSTGRES_PASSWORD: team_finder
      POSTGRES_HOST: localhost
      POSTGRES_PORT: "5432"
      ALLOWED_HOSTS: localhost,127.0.0.1,testserver

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Run ruff
        run: ruff check .

      - name: Check migrations
        run: python manage.py makemigrations --check --dry-run

      - name: Run tests
        run: python manage.py test

  docker:
    runs-on: ubuntu-latest
    needs: tests
    if: github.event_name == 'push'

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t team-finder-ad:${{ github.sha }} .

      - name: Login to Docker Hub
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push Docker image
        if: ${{ secrets.DOCKERHUB_USERNAME != '' && secrets.DOCKERHUB_TOKEN != '' }}
        run: |
          docker tag team-finder-ad:${{ github.sha }} ${{ secrets.DOCKERHUB_USERNAME }}/team-finder-ad:latest
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/team-finder-ad:latest
